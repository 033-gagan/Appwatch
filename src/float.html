<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=DM+Sans:wght@500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 180px;
  height: 80px;
  background: transparent;
  overflow: hidden;
  user-select: none;
}

/* ── Outer shell ── */
#widget {
  width: 180px;
  height: 80px;
  position: relative;
  cursor: grab;
}
#widget:active { cursor: grabbing; }

/* ── Main pill (always visible) ── */
#pill {
  position: absolute;
  inset: 0;
  background: rgba(10, 10, 12, 0.90);
  border: 1.5px solid rgba(232, 255, 71, 0.40);
  border-radius: 20px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow:
    0 4px 24px rgba(0,0,0,0.55),
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 0 20px rgba(232,255,71,0.08);
  display: flex;
  align-items: center;
  padding: 0 16px 0 12px;
  gap: 11px;
  transition: border-color 0.3s, box-shadow 0.3s;
  overflow: hidden;
}

#widget.paused #pill {
  border-color: rgba(90, 90, 105, 0.40);
  box-shadow: 0 4px 24px rgba(0,0,0,0.55);
}

/* Active glow animation */
#pill::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 20px;
  box-shadow: 0 0 22px rgba(232,255,71,0.18);
  animation: glowPulse 2s ease-in-out infinite;
  pointer-events: none;
}
#widget.paused #pill::after { display: none; }

@keyframes glowPulse {
  0%,100% { opacity: 0.5; }
  50%      { opacity: 1.0; }
}

/* ── Icon bubble ── */
#icon-wrap {
  width: 42px;
  height: 42px;
  border-radius: 13px;
  background: rgba(232,255,71,0.10);
  border: 1px solid rgba(232,255,71,0.20);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
#widget.paused #icon-wrap {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.08);
}

/* ── Right side ── */
#right {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

#app-name {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: #6b6b7a;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

#timer-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

#timer {
  font-family: 'Space Mono', 'Courier New', monospace;
  font-size: 21px;
  font-weight: 700;
  color: #e8ff47;
  letter-spacing: 0.03em;
  line-height: 1;
  transition: color 0.3s;
}
#widget.paused #timer { color: #4a4a58; }

/* Live dot */
#live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #e8ff47;
  flex-shrink: 0;
  animation: blink 1.1s ease-in-out infinite;
  margin-bottom: 1px;
}
#widget.paused #live-dot { background: #2e2e3a; animation: none; }

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0; }
}

/* ── Hover control bar ── */
#hover-bar {
  position: absolute;
  bottom: -2px;
  left: 8px;
  right: 8px;
  height: 30px;
  background: rgba(10,10,12,0.95);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 0 0 14px 14px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
  z-index: 10;
}

#widget:hover #hover-bar {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.hbtn {
  flex: 1;
  height: 22px;
  border: none;
  background: transparent;
  color: #6b6b7a;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.12s, background 0.12s;
}
.hbtn:hover       { color: #e8ff47; background: rgba(232,255,71,0.10); }
.hbtn.red:hover   { color: #ff4757; background: rgba(255,71,87,0.10); }

.hbtn-sep {
  width: 1px;
  height: 14px;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}

/* ── Tooltip labels ── */
.hbtn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #e0e0ec;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 5px;
  white-space: nowrap;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="widget" class="paused">

  <!-- Always-visible pill -->
  <div id="pill">
    <div id="icon-wrap">
      <span id="app-icon">⏱</span>
    </div>
    <div id="right">
      <div id="app-name">Not tracking</div>
      <div id="timer-row">
        <div id="timer">00:00</div>
        <div id="live-dot"></div>
      </div>
    </div>
  </div>

  <!-- Hover controls slide up from bottom -->
  <div id="hover-bar">
    <button class="hbtn" id="btn-open"  title="Open AppWatch">⬆</button>
    <div class="hbtn-sep"></div>
    <button class="hbtn red" id="btn-stop" title="Stop">⏹</button>
    <div class="hbtn-sep"></div>
    <button class="hbtn" id="btn-hide"  title="Hide">✕</button>
  </div>

</div>

<script>
const { ipcRenderer } = require('electron');

const widget  = document.getElementById('widget');
const iconEl  = document.getElementById('app-icon');
const nameEl  = document.getElementById('app-name');
const timerEl = document.getElementById('timer');

// ── Receive ticks ─────────────────────────────────────────────────────────────
ipcRenderer.on('float-init', (_, { icon, name, seconds }) => {
  iconEl.textContent  = icon || '⏱';
  nameEl.textContent  = name || 'Not tracking';
  timerEl.textContent = formatTime(seconds || 0);
  widget.classList.remove('paused');
});

ipcRenderer.on('float-update', (_, { icon, name, seconds, paused }) => {
  if (icon)  iconEl.textContent  = icon;
  if (name)  nameEl.textContent  = name;
  timerEl.textContent = formatTime(seconds || 0);
  widget.classList.toggle('paused', !!paused);
});

// ── Control buttons ───────────────────────────────────────────────────────────
document.getElementById('btn-open').addEventListener('click', (e) => {
  e.stopPropagation();
  ipcRenderer.send('float-open-main');
});
document.getElementById('btn-stop').addEventListener('click', (e) => {
  e.stopPropagation();
  ipcRenderer.send('float-stop-tracking');
});
document.getElementById('btn-hide').addEventListener('click', (e) => {
  e.stopPropagation();
  ipcRenderer.send('float-hide');
});

// ── Drag ─────────────────────────────────────────────────────────────────────
let dragging = false, sx, sy;

widget.addEventListener('mousedown', (e) => {
  if (e.target.closest('#hover-bar')) return;
  dragging = true; sx = e.screenX; sy = e.screenY;
});
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.screenX - sx, dy = e.screenY - sy;
  sx = e.screenX; sy = e.screenY;
  ipcRenderer.send('float-move-delta', { dx, dy });
});
document.addEventListener('mouseup', () => { dragging = false; });

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
</script>
</body>
</html>
