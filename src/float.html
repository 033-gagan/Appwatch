<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="./float/float.css" />
</head>
<body>

<div id="widget" class="paused">
  <div id="pill">
    <div id="icon-wrap">
      <span id="app-icon">⏱</span>
    </div>
    <div id="right">
      <div id="app-name">Not tracking</div>
      <div id="timer-row">
        <div id="timer">00:00</div>
        <div id="live-dot"></div>
      </div>
    </div>
  </div>

  <div id="hover-bar">
    <button class="hbtn" id="btn-open" title="Open AppWatch">⬆</button>
    <div class="hbtn-sep"></div>
    <button class="hbtn" id="btn-toggle" title="Resume">▶</button>
    <div class="hbtn-sep"></div>
    <button class="hbtn red" id="btn-stop" title="Stop">⏹</button>
    <div class="hbtn-sep"></div>
    <button class="hbtn" id="btn-hide" title="Hide">✕</button>
  </div>
</div>

<script src="./float/float.js"></script>
</body>
</html>
